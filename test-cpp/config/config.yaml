input_file:   ../data/cpp_test_uniform.mat
output_file:  ../data/stat_uniform.mat
sol_file:     ../data/converged_uniform.mat
save_sol:     true
input_var:    cpp_data_all

# State layout per timestep: [R(9), p(3), F(9), v(3)] = 24 elements
# Trajectory: 21 timesteps => 504 state elements
# Inputs: 4 x 20 = 80 elements
n_state_steps: 21
n_input_steps: 20
state_dim:     24   # per step: 9+3+9+3
input_dim:     4    # per step
num_cases: 1000

perturbation:
  delta_R:  0.00   # SO(3) rotation noise std  (rad)
  delta_p:  0.00   # position noise std         (m)
  delta_F:  0.00   # SO(3) frame noise std      (rad)
  delta_v:  0.00   # velocity noise std         (m/s)
  delta_u:  0.00   # input noise std
  delta_y:  0.00   # equality multiplier noise std
  delta_z:  0.00   # inequality multiplier log-noise std (multiplicative)
  delta_s:  0.00   # slack log-noise std         (multiplicative)
  delta_mu: 0.00   # barrier param log-noise std (multiplicative)

ipm:
  iter_max:                      1000
  overall_kkt_acceptance_rate:   1.0e-6
  barrier_kkt_acceptance_rate:   1.0e-3
  time_limit:                    10.0
